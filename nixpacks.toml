[phases.setup]
nixPkgs = [
  "python311",
  "gcc",
  "pango",
  "cairo",
  "harfbuzz",
  "fontconfig",
  "freetype",
  "gdk-pixbuf",
  "glib",
  "libffi",
  "shared-mime-info",
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
