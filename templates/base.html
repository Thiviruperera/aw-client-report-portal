<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AW Client Report Portal{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="{{ url_for('clients_list') }}" class="brand">
        <span class="brand-mark">AW</span>
        <span class="brand-name">Client Report Portal</span>
      </a>
      {% if session.authed %}
      <nav>
        <a href="{{ url_for('clients_list') }}">Clients</a>
        <a href="{{ url_for('logout') }}" class="muted">Sign out</a>
      </nav>
      {% endif %}
    </div>
  </header>

  <main class="container">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for category, msg in msgs %}
        <div class="flash flash-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <span class="muted">Internal portal · Demo build · See README for assumptions.</span>
    </div>
  </footer>
</body>
</html>
